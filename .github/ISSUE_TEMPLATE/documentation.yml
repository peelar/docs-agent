name: Documentation gap
description: Report inaccurate, missing, or confusing Paige documentation.
title: "docs: "
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link the page or name the repository path.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Reader problem
      description: What does the current documentation make difficult or inaccurate?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Current evidence
      description: Point to the behavior, code, release, or decision that the documentation should match.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested correction
      description: Optional. A small proposed wording or structure is useful, but evidence matters more than finished copy.
