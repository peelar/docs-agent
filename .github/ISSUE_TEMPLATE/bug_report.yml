name: Bug report
description: Report reproducible behavior that does not match Paige's contract.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping make Paige more trustworthy. Remove secrets and private repository or provider content before submitting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the actual behavior and why it is a problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: State the expected decision, output, or failure mode.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest reproducible sequence, including the command or channel involved.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Agent or documentation decision
        - Repository inspection or authoring
        - GitHub writeback or approval
        - Slack or Linear
        - Operator app
        - Setup or deployment
        - Evaluation or development tooling
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the Paige revision, Node version, deployment shape, and relevant provider state.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Safe evidence
      description: Add sanitized logs, screenshots, traces, or links. Do not paste credentials.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I removed secrets and private customer or repository content.
          required: true
        - label: I searched existing issues for the same failure.
          required: true
