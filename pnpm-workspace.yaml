packages:
  - "apps/*"
  - "packages/*"

minimumReleaseAgeExclude:
  - "@ai-sdk/*"
  - "@chat-adapter/*"
  - "@rolldown/*"
  - "@turbo/*"
  - "@vercel/*"
  - "@workflow/*"
  - ai
  - chat
  - experimental-ai-sdk-code-mode
  - eve
  - next
  - nitro
  - react
  - react-dom
  - rolldown
  - turbo
  - tsx
  - workflow
  - '@next/env@16.2.11'
  - '@next/swc-darwin-arm64@16.2.11'
  - '@next/swc-darwin-x64@16.2.11'
  - '@next/swc-linux-arm64-gnu@16.2.11'
  - '@next/swc-linux-arm64-musl@16.2.11'
  - '@next/swc-linux-x64-gnu@16.2.11'
  - '@next/swc-linux-x64-musl@16.2.11'
  - '@next/swc-win32-arm64-msvc@16.2.11'
  - '@next/swc-win32-x64-msvc@16.2.11'
  - postcss@8.5.21
allowBuilds:
  esbuild: false
  sharp: false
# Keep Eve and the app on the same locally verified Microsandbox build.
overrides:
  "@esbuild-kit/core-utils>esbuild": 0.25.12
  microsandbox: 0.5.7
  postcss: 8.5.21
  sharp: 0.35.3
