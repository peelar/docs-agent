name: Feature request
description: Propose a general capability or product-boundary improvement.
title: "feature: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Maintainer problem
      description: What documentation-maintenance problem exists today? Start with the user and evidence, not the implementation.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Concrete example
      description: Show one real situation where the missing capability matters. Remove sensitive context.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should Paige decide, produce, or make visible?
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Authority and safety boundary
      description: What may Paige read or change, and what must still require human approval?
    validations:
      required: true
  - type: textarea
    id: generality
    attributes:
      label: Why this generalizes
      description: Explain why this is not a workflow for only one repository, provider, or incident.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and the roadmap for the same capability.
          required: true
        - label: This request does not depend on silently treating a broken integration as successful.
          required: true
